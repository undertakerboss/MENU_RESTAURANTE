<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - La Parrilla Burger & Grill</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>

    <div class="header">
        <h1>La Parrilla</h1>
        <p>Pedido Directo a Cocina</p>
    </div>

    <div class="menu-wrapper">
        <div class="category-title">Carta Interactiva</div>

        {% for plato in platos %}
        <div class="menu-card">
            <div class="item-details">
                <div class="item-header">
                    <h3 class="item-name">{{ plato.nombre }}</h3>
                    <span class="item-price">${{ "{:,}".format(plato.precio).replace(',', '.') }}</span>
                </div>
                <p class="item-desc">{{ plato.descripcion }}</p>
                <button class="card-order-btn" onclick="addToCart('{{ plato.nombre }}', {{ plato.precio }})">
                    ➕ Agregar
                </button>
            </div>
            <div class="parallax-container">
                <img src="{{ plato.imagen }}" alt="{{ plato.nombre }}" class="spinning-plate" {% if loop.index % 2 == 0 %}style="animation-direction: reverse;"{% endif %}>
            </div>
        </div>
        {% endfor %}
        </div>

    <button class="cart-float-btn" id="cartBtn" onclick="openCart()" style="display: none;">
        🛒 Ver Pedido (<span id="cartCount">0</span>) - <span id="cartTotalBtn">$0</span>
    </button>

    <div class="modal-overlay" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tu Comanda</h2>
                <button class="close-btn" onclick="closeCart()">×</button>
            </div>
            
            <div id="cartItemsList"></div>

            <div class="upsell-box" id="upsellBox">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" id="comboUpsell" value="6000" onchange="updateCartTotal()">
                    <div>
                        <strong style="color: var(--text-dark);">¿Agrandar con Papas y Gaseosa?</strong><br>
                        <span style="color: var(--accent-color);">+ $6.000 (Promoción)</span>
                    </div>
                </label>
            </div>

            <div class="checkout-form">
                <input type="text" id="clientName" placeholder="Tu Nombre (Para entregarte en la mesa)" required>
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <div style="flex: 1; background: #F8F8F8; padding: 10px; border-radius: 8px; border: 1px solid #DDD;">
                        <span style="font-size: 12px; color: var(--text-muted);">MESA N°</span>
                        <input type="number" id="tableNumber" value="{{ mesa_id or '' }}" placeholder="Ej: 4" style="width: 100%; background: transparent; border: none; color: var(--accent-color); font-size: 20px; font-weight: bold; outline: none;" {% if mesa_id %}readonly{% endif %}>
                    </div>
                </div>
                
                <textarea id="orderNotes" rows="2" placeholder="Notas a cocina: Sin cebolla, salsas aparte..."></textarea>
            </div>

            <div class="total-section">
                <span>TOTAL A PAGAR:</span>
                <span id="finalTotalDisplay" style="color: var(--accent-color); font-size: 24px; font-weight: bold;">$0</span>
            </div>

            <button class="btn-confirm-order" onclick="sendToKitchen()">
                🔥 Enviar Comanda a Cocina
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', path='js/app.js') }}"></script>
</body>
</html>
