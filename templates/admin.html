<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - La Parrilla</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-verde { background: #25D366; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        .btn-rojo { background: #ff4444; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Panel de Control (Inventario)</h2>
    <p>Apaga los platos que se hayan agotado en la cocina.</p>

    {% for plato in platos %}
    <div class="card">
        <div>
            <strong>{{ plato.nombre }}</strong> <br>
            <span style="color: gray;">Estado actual: {% if plato.disponible %} ✅ Disponible {% else %} ❌ Agotado {% endif %}</span>
        </div>
        <form action="/admin/toggle/{{ plato.id }}" method="post">
            {% if plato.disponible %}
                <button type="submit" class="btn-rojo">Marcar como Agotado</button>
            {% else %}
                <button type="submit" class="btn-verde">Volver a Activar</button>
            {% endif %}
        </form>
    </div>
    {% endfor %}
</body>
</html>
