<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .panel { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-qr { display: block; width: 100%; background: #2f3542; color: white; text-align: center; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px; margin-bottom: 20px; }
        .form-agregar { display: flex; gap: 10px; margin-bottom: 20px; background: #f1f2f6; padding: 15px; border-radius: 8px;}
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: #007bff; color: white; }
        .plato { background: #fff; border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-agotado { background-color: #ff4757; }
        .btn-disponible { background-color: #2ed573; color: #2f3542; }
    </style>
</head>
<body>
    <div class="panel">
        <h1 style="margin-top:0;">Restaurante: {{ restaurante.nombre }}</h1>
        
        <a href="/admin/{{ restaurante.id }}/qr" class="btn-qr">📥 Generar e Imprimir Código QR</a>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <h3>Añadir Nuevo Plato</h3>
        <form class="form-agregar" action="/admin/{{ restaurante.id }}/agregar" method="post">
            <input type="text" name="nombre" placeholder="Ej. Hamburguesa" required>
            <input type="number" name="precio" placeholder="Ej. 8000" required>
            <button type="submit">Guardar Plato</button>
        </form>

        <h3>Menú Actual</h3>
        {% for plato in platos %}
        <div class="plato">
            <div>
                <strong>{{ plato.nombre }}</strong> - ${{ "{:,.0f}".format(plato.precio) }}<br>
                <small style="color: {{ 'green' if plato.disponible else 'red' }}">Estado: {{ "Disponible" if plato.disponible else "Agotado" }}</small>
            </div>
            <form action="/admin/toggle/{{ plato.id }}" method="post" style="margin: 0;">
                <button type="submit" class="{{ 'btn-agotado' if plato.disponible else 'btn-disponible' }}">
                    {{ "Marcar Agotado" if plato.disponible else "Marcar Disponible" }}
                </button>
            </form>
        </div>
        {% endfor %}
    </div>
</body>
</html>
